<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星语 · AI 语音助手</title>
    <script src="config.js"></script>
    <style>
        /* ===== Reset & Base ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-start: #0f0c29;
            --bg-mid: #302b63;
            --bg-end: #24243e;
            --glass-bg: rgba(255,255,255,0.06);
            --glass-border: rgba(255,255,255,0.12);
            --primary: #6c63ff;
            --primary-glow: rgba(108,99,255,0.4);
            --accent: #00d4ff;
            --text: #e8e8f0;
            --text-muted: rgba(255,255,255,0.45);
            --user-bubble: linear-gradient(135deg, #6c63ff, #a855f7);
            --ai-bubble: rgba(255,255,255,0.08);
            --shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        
        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--bg-start), var(--bg-mid), var(--bg-end));
            color: var(--text);
            overflow: hidden;
        }
        
        /* ===== Animated Background ===== */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(ellipse 80% 50% at 30% 20%, rgba(108,99,255,0.12) 0%, transparent 70%),
                radial-gradient(ellipse 60% 40% at 70% 80%, rgba(0,212,255,0.08) 0%, transparent 70%),
                radial-gradient(ellipse 50% 30% at 50% 50%, rgba(168,85,247,0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }
        
        /* ===== Floating Orbs ===== */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(60px);
            pointer-events: none;
            z-index: 0;
            animation: orbFloat 20s ease-in-out infinite;
        }
        .orb-1 { 
            width: 400px; height: 400px; 
            background: rgba(108,99,255,0.15); 
            top: -100px; left: -100px;
            animation-delay: 0s;
        }
        .orb-2 { 
            width: 350px; height: 350px; 
            background: rgba(0,212,255,0.1); 
            bottom: -80px; right: -80px;
            animation-delay: -7s;
        }
        .orb-3 { 
            width: 250px; height: 250px; 
            background: rgba(168,85,247,0.1); 
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -14s;
        }
        
        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -40px) scale(1.1); }
            66% { transform: translate(-20px, 30px) scale(0.9); }
        }
        
        /* ===== Main Layout ===== */
        .app {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 720px;
            margin: 0 auto;
            padding: 20px 24px;
        }
        
        /* ===== Header ===== */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 0;
            flex-shrink: 0;
        }
        .header-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header-logo {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--primary), #a855f7);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 15px var(--primary-glow);
        }
        .header-title {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .header-title span {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header-subtitle {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }
        
        /* ===== Chat Box ===== */
        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 12px 0;
            scroll-behavior: smooth;
            min-height: 0;
        }
        .chat-box::-webkit-scrollbar {
            width: 4px;
        }
        .chat-box::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-box::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.15);
            border-radius: 2px;
        }
        
        /* ===== Messages ===== */
        .message {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 20px;
            opacity: 0;
            animation: msgIn 0.3s ease forwards;
        }
        @keyframes msgIn {
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user { transform: translateY(8px); }
        .message.ai { transform: translateY(8px); }
        
        .message.user { flex-direction: row-reverse; }
        
        .message-avatar {
            width: 32px; height: 32px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }
        .message.user .message-avatar {
            background: linear-gradient(135deg, var(--primary), #a855f7);
            box-shadow: 0 2px 10px var(--primary-glow);
        }
        .message.ai .message-avatar {
            background: linear-gradient(135deg, var(--accent), #06b6d4);
            box-shadow: 0 2px 10px rgba(0,212,255,0.3);
        }
        
        .message-bubble {
            max-width: 75%;
            padding: 14px 18px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.6;
            word-break: break-word;
        }
        .message.user .message-bubble {
            background: var(--user-bubble);
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .message.ai .message-bubble {
            background: var(--ai-bubble);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            border-bottom-left-radius: 4px;
        }
        
        /* ===== Thinking Indicator ===== */
        .thinking-dots {
            display: inline-flex;
            gap: 4px;
            padding: 4px 0;
        }
        .thinking-dots span {
            width: 8px; height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: dotBounce 1.4s ease-in-out infinite;
        }
        .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
        .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotBounce {
            0%, 80%, 100% { transform: scale(0.5); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }
        
        /* ===== Control Bar ===== */
        .control-bar {
            flex-shrink: 0;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            backdrop-filter: blur(20px);
            padding: 8px 16px;
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        /* ===== Record Button ===== */
        .record-btn {
            width: 44px; height: 44px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, var(--primary), #a855f7);
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px var(--primary-glow);
            position: relative;
        }
        .record-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 30px var(--primary-glow);
        }
        .record-btn:active { transform: scale(0.95); }
        
        .record-btn.recording {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            box-shadow: 0 4px 20px rgba(239,68,68,0.4);
            animation: pulseRecord 2s ease-in-out infinite;
        }
        .record-btn.recording::after {
            content: '⏹';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
        }
        .record-btn.recording .mic-icon { display: none; }
        .record-btn .stop-icon { display: none; }
        .record-btn.recording .stop-icon { display: inline; }
        @keyframes pulseRecord {
            0%, 100% { box-shadow: 0 4px 20px rgba(239,68,68,0.4); }
            50% { box-shadow: 0 4px 40px rgba(239,68,68,0.6); }
        }
        
        .record-label {
            font-size: 11px;
            color: var(--text-muted);
            white-space: nowrap;
            transition: all 0.3s;
        }
        .record-label.active {
            color: #ef4444;
            font-weight: 600;
        }
        
        /* ===== Audio Wave Animation ===== */
        .wave-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            height: 40px;
            padding: 0 20px;
        }
        .wave-bar {
            width: 4px;
            height: 8px;
            background: linear-gradient(to top, #3b82f6, #60a5fa, #93c5fd);
            border-radius: 2px;
            transition: height 0.2s ease-out;
            opacity: 0.85;
        }
        .wave-bar.inactive {
            height: 8px !important;
            background: rgba(255,255,255,0.06);
        }
        
        /* ===== Status ===== */
        .status-area {
            flex-shrink: 0;
            text-align: center;
            padding: 8px 0 4px;
            font-size: 13px;
            color: var(--text-muted);
            min-height: 32px;
            transition: all 0.3s ease;
        }
        .status-area.active { color: var(--accent); }
        .status-area.error { color: #ef4444; }
        
        /* ===== Settings Panel ===== */
        .settings-toggle {
            width: 36px; height: 36px;
            border-radius: 50%;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            color: var(--text);
            font-size: 16px;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .settings-toggle:hover {
            background: rgba(255,255,255,0.12);
        }
        
        .settings-panel {
            position: absolute;
            bottom: calc(100% + 10px);
            right: 0;
            left: 0;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            backdrop-filter: blur(30px);
            padding: 20px;
            display: none;
            box-shadow: var(--shadow);
        }
        .settings-panel.open { display: block; }
        
        .settings-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
        }
        .settings-row:last-child { margin-bottom: 0; }
        .settings-label {
            font-size: 13px;
            color: var(--text-muted);
            min-width: 60px;
        }
        .settings-select {
            flex: 1;
            padding: 8px 12px;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.06);
            color: var(--text);
            font-size: 13px;
            outline: none;
            cursor: pointer;
            transition: border 0.2s;
        }
        .settings-select:focus {
            border-color: var(--primary);
        }
        .settings-select option {
            background: #1a1a2e;
            color: #e8e8f0;
        }
        
        /* ===== Clear Button ===== */
        .clear-btn {
            padding: 6px 14px;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            background: transparent;
            color: var(--text-muted);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .clear-btn:hover {
            background: rgba(239,68,68,0.1);
            border-color: rgba(239,68,68,0.3);
            color: #ef4444;
        }
        
        /* ===== Recording Overlay Text ===== */
        .listening-text {
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .listening-text.active {
            color: var(--accent);
        }
        
        /* ===== Pipeline Status Bar ===== */
        .pipeline {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            flex-shrink: 0;
            padding: 6px 8px;
            margin-bottom: 2px;
            flex-wrap: nowrap;
            overflow: hidden;
        }
        .pipeline-item {
            display: flex;
            align-items: center;
            gap: 3px;
            padding: 3px 8px;
            border-radius: 8px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            font-size: 11px;
            color: var(--text-muted);
            transition: all 0.3s ease;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .pipeline-item.nowrap { white-space: nowrap; }
        .pipeline-item .p-icon {
            font-size: 14px;
        }
        .pipeline-item .p-label {
            font-weight: 500;
        }
        .pipeline-item.nowrap .p-label {
            white-space: nowrap;
        }
        .pipeline-item .p-time {
            font-size: 11px;
            opacity: 0.5;
            margin-left: 4px;
        }
        .pipeline-item.idle {
            border-color: rgba(255,255,255,0.06);
        }
        .pipeline-item.idle .p-icon { color: var(--text-muted); }
        
        .pipeline-item.running {
            border-color: var(--accent);
            background: rgba(0,212,255,0.08);
            box-shadow: 0 0 15px rgba(0,212,255,0.15);
            animation: pipePulse 1.5s ease-in-out infinite;
        }
        .pipeline-item.running .p-icon { 
            color: var(--accent); 
            animation: spin 2s linear infinite;
        }
        .pipeline-item.done {
            border-color: rgba(52,211,153,0.3);
            background: rgba(52,211,153,0.06);
        }
        .pipeline-item.done .p-icon { color: #34d399; }
        
        .pipeline-item.error {
            border-color: rgba(239,68,68,0.3);
            background: rgba(239,68,68,0.06);
        }
        .pipeline-item.error .p-icon { color: #ef4444; }
        
        .pipeline-arrow {
            color: var(--text-muted);
            font-size: 12px;
            opacity: 0.3;
            flex-shrink: 0;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes pipePulse {
            0%, 100% { box-shadow: 0 0 10px rgba(0,212,255,0.1); }
            50% { box-shadow: 0 0 20px rgba(0,212,255,0.25); }
        }
        
        /* ===== Welcome Screen ===== */
        .welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            gap: 16px;
        }
        .welcome-icon {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, var(--primary), #a855f7);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            box-shadow: 0 8px 30px var(--primary-glow);
        }
        .welcome h2 {
            font-size: 24px;
            font-weight: 600;
        }
        .welcome p {
            color: var(--text-muted);
            font-size: 15px;
            max-width: 360px;
            line-height: 1.7;
        }
        
        /* 整体调大字号的覆盖 */
        .message-bubble { font-size: 14px; }
        .status-area { font-size: 14px; }
        .header-title { font-size: 18px; }
        .pipeline-item { font-size: 12px; }
        .welcome-icon { font-size: 42px; }
        
        /* ===== Responsive ===== */
        @media (max-width: 600px) {
            .app { padding: 12px 16px; }
            .header-title { font-size: 17px; }
            .control-bar { padding: 12px 14px; gap: 10px; }
            .record-btn { width: 48px; height: 48px; font-size: 18px; }
            .message-bubble { max-width: 85%; font-size: 13px; }
            .settings-panel { left: 0; right: 0; }
        }
    </style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="app">
    <!-- Header -->
    <div class="header">
        <div class="header-brand">
            <div class="header-logo">✨</div>
            <div>
                <div class="header-title"><span>星语</span> · AI</div>
                <div class="header-subtitle">智能语音对话系统</div>
            </div>
        </div>
        <button class="clear-btn" id="clearBtn">清空对话</button>
    </div>

    <!-- Messages -->
    <div class="chat-box" id="chatBox">
        <div class="welcome" id="welcome">
            <div class="welcome-icon">🎙️</div>
            <h2>全链路 AI 语音对话</h2>
            <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:8px;">
                <span style="padding:6px 14px;border-radius:20px;border:1px solid rgba(0,212,255,0.2);background:rgba(0,212,255,0.06);font-size:13px;">🎙️ ASR 语音识别</span>
                <span style="padding:6px 14px;border-radius:20px;border:1px solid rgba(108,99,255,0.2);background:rgba(108,99,255,0.06);font-size:13px;">🧠 LLM 大模型推理</span>
                <span style="padding:6px 14px;border-radius:20px;border:1px solid rgba(168,85,247,0.2);background:rgba(168,85,247,0.06);font-size:13px;">🔊 TTS 语音合成</span>
                <span style="padding:6px 14px;border-radius:20px;border:1px solid rgba(52,211,153,0.2);background:rgba(52,211,153,0.06);font-size:13px;">⚡ 实时打断</span>
            </div>
            <p style="margin-top:12px;font-size:14px;color:var(--text-muted);">
                当前状态实时追踪 · 支持多轮对话 · 随时打断重新提问
            </p>
            <p style="margin-top:16px;font-size:14px;color:var(--accent);">点击 🎤 按钮开始对话</p>
        </div>
    </div>

    <!-- Pipeline Status -->
    <div class="pipeline" id="pipeline">
        <div class="pipeline-item idle" id="pipeAsr">
            <span class="p-icon">🎙️</span>
            <span class="p-label">ASR 识别</span>
            <span class="p-time" id="pipeAsrTime"></span>
        </div>
        <span class="pipeline-arrow">→</span>
        <div class="pipeline-item idle" id="pipeLLM">
            <span class="p-icon">🧠</span>
            <span class="p-label">LLM 推理</span>
            <span class="p-time" id="pipeLLMTime"></span>
        </div>
        <span class="pipeline-arrow">→</span>
        <div class="pipeline-item idle nowrap" id="pipeTTS">
            <span class="p-icon">🔊</span>
            <span class="p-label">TTS 合成</span>
            <span class="p-time" id="pipeTTSTime"></span>
        </div>
    </div>

    <!-- Status -->
    <div class="status-area" id="status"></div>

    <!-- Control Bar -->
    <div class="control-bar" style="position: relative;">
        <div style="display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;">
            <button class="record-btn" id="recordBtn">
                <span class="mic-icon">🎤</span>
            </button>
            <span class="record-label" id="recordLabel">开始对话</span>
        </div>
        
        <div class="wave-container" id="waveContainer">
            <div class="wave-bar inactive" id="w0"></div>
            <div class="wave-bar inactive" id="w1"></div>
            <div class="wave-bar inactive" id="w2"></div>
            <div class="wave-bar inactive" id="w3"></div>
            <div class="wave-bar inactive" id="w4"></div>
            <div class="wave-bar inactive" id="w5"></div>
            <div class="wave-bar inactive" id="w6"></div>
            <div class="wave-bar inactive" id="w7"></div>
            <div class="wave-bar inactive" id="w8"></div>
            <div class="wave-bar inactive" id="w9"></div>
            <div class="wave-bar inactive" id="w10"></div>
            <div class="wave-bar inactive" id="w11"></div>
            <div class="wave-bar inactive" id="w12"></div>
            <div class="wave-bar inactive" id="w13"></div>
            <div class="wave-bar inactive" id="w14"></div>
            <div class="wave-bar inactive" id="w15"></div>
        </div>
        
        <button class="settings-toggle" id="settingsToggle">⚙️</button>
        
        <!-- Settings Panel -->
        <div class="settings-panel" id="settingsPanel">
            <div class="settings-row">
                <span class="settings-label">TTS 引擎</span>
                <select class="settings-select" id="ttsEngineSelect">
                    <option value="bailian">百炼 TTS</option>
                    <option value="edge">Edge TTS</option>
                </select>
            </div>
            <div class="settings-row" id="edgeTTSOptions">
                <span class="settings-label">音色</span>
                <select class="settings-select" id="voiceSelect">
                    <option value="xiaoxiao">晓晓 · 活泼</option>
                    <option value="xiaoyi">晓伊 · 甜美</option>
                    <option value="xiaohan">晓涵 · 温柔</option>
                    <option value="yunxi">云希 · 阳光</option>
                    <option value="yunyang">云扬 · 沉稳</option>
                </select>
                <span class="settings-label" style="min-width:40px">语速</span>
                <select class="settings-select" id="rateSelect">
                    <option value="+10%">稍快</option>
                    <option value="+30%" selected>较快</option>
                    <option value="+50%">很快</option>
                </select>
            </div>
            <div class="settings-row" id="bailianTTSOptions" style="display:none">
                <span class="settings-label">音色</span>
                <select class="settings-select" id="bailianVoiceSelect">
                    <option value="longanhuan_v3.6">龙安欢（默认）</option>
                    <option value="longxiaochun">龙小淳（女声）</option>
                    <option value="longxiaoxia">龙小夏（女声）</option>
                    <option value="longxiaochen">龙小晨（男声）</option>
                </select>
            </div>
        </div>
    </div>
</div>

<audio id="audioPlayer" style="display:none;"></audio>

<script>
    // API 地址配置 - 部署时修改为后端实际地址
    const API_BASE = window.API_BASE || '';
    const WS_BASE = window.WS_BASE || `ws://${location.host}`;
    let isRecording = false;
    let realtimeWs = null;
    let audioContext = null;
    let scriptProcessor = null;
    let mediaStream = null;
    let isSpeaking = false;
    let isProcessing = false;
    let waveAnimId = null;
    let currentAudioLevel = 0;
    let ttsAudioLevel = 0;

    // DOM
    const recordBtn = document.getElementById('recordBtn');
    const recordLabel = document.getElementById('recordLabel');
    const clearBtn = document.getElementById('clearBtn');
    const chatBox = document.getElementById('chatBox');
    const statusEl = document.getElementById('status');
    const audioPlayer = document.getElementById('audioPlayer');
    const welcome = document.getElementById('welcome');
    const settingsToggle = document.getElementById('settingsToggle');
    const settingsPanel = document.getElementById('settingsPanel');
    const ttsEngineSelect = document.getElementById('ttsEngineSelect');
    const edgeTTSOptions = document.getElementById('edgeTTSOptions');
    const bailianTTSOptions = document.getElementById('bailianTTSOptions');

    // Pipeline DOM
    const pipeAsr = document.getElementById('pipeAsr');
    const pipeLLM = document.getElementById('pipeLLM');
    const pipeTTS = document.getElementById('pipeTTS');
    const pipeAsrTime = document.getElementById('pipeAsrTime');
    const pipeLLMTime = document.getElementById('pipeLLMTime');
    const pipeTTSTime = document.getElementById('pipeTTSTime');

    // Wave bars
    const waveBars = [];
    for (let i = 0; i < 16; i++) {
        waveBars.push(document.getElementById('w' + i));
    }

    // ===== Pipeline Status =====
    let pipeTimer = null;
    let pipeStart = 0;

    function setPipeState(el, state, timeEl) {
        el.className = 'pipeline-item';
        if (state) el.classList.add(state);
        if (state === 'running' && timeEl) {
            const start = Date.now();
            pipeStart = start;
            if (pipeTimer) clearInterval(pipeTimer);
            timeEl.textContent = '0ms';
            pipeTimer = setInterval(() => {
                const ms = Date.now() - start;
                timeEl.textContent = ms + 'ms';
            }, 100);
        } else if (state === 'done' && timeEl) {
            if (pipeTimer) clearInterval(pipeTimer);
            pipeTimer = null;
        } else if (state === 'idle' && timeEl) {
            timeEl.textContent = '';
        }
    }

    function resetPipes() {
        setPipeState(pipeAsr, 'idle', pipeAsrTime);
        setPipeState(pipeLLM, 'idle', pipeLLMTime);
        setPipeState(pipeTTS, 'idle', pipeTTSTime);
    }

    // ===== Settings =====
    settingsToggle.addEventListener('click', () => {
        settingsPanel.classList.toggle('open');
    });

    ttsEngineSelect.addEventListener('change', () => {
        if (ttsEngineSelect.value === 'edge') {
            edgeTTSOptions.style.display = 'flex';
            bailianTTSOptions.style.display = 'none';
        } else {
            edgeTTSOptions.style.display = 'none';
            bailianTTSOptions.style.display = 'flex';
        }
    });

    // 初始化显示百炼 TTS 选项
    if (ttsEngineSelect.value === 'bailian') {
        edgeTTSOptions.style.display = 'none';
        bailianTTSOptions.style.display = 'flex';
    }

    clearBtn.addEventListener('click', async () => {
        try {
            await fetch(`${API_BASE}/api/clear`, { method: 'POST' });
            chatBox.innerHTML = `
                <div class="welcome" id="welcome">
                    <div class="welcome-icon">🎙️</div>
                    <h2>全链路 AI 语音对话</h2>
                    <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:8px;">
                        <span style="padding:6px 14px;border-radius:20px;border:1px solid rgba(0,212,255,0.2);background:rgba(0,212,255,0.06);font-size:13px;">🎙️ ASR 语音识别</span>
                        <span style="padding:6px 14px;border-radius:20px;border:1px solid rgba(108,99,255,0.2);background:rgba(108,99,255,0.06);font-size:13px;">🧠 LLM 大模型推理</span>
                        <span style="padding:6px 14px;border-radius:20px;border:1px solid rgba(168,85,247,0.2);background:rgba(168,85,247,0.06);font-size:13px;">🔊 TTS 语音合成</span>
                        <span style="padding:6px 14px;border-radius:20px;border:1px solid rgba(52,211,153,0.2);background:rgba(52,211,153,0.06);font-size:13px;">⚡ 实时打断</span>
                    </div>
                    <p style="margin-top:12px;font-size:14px;color:var(--text-muted);">
                        当前状态实时追踪 · 支持多轮对话 · 随时打断重新提问
                    </p>
                    <p style="margin-top:16px;font-size:14px;color:var(--accent);">点击 🎤 按钮开始对话</p>
                </div>`;
            setStatus('对话已清空', '');
        } catch (e) {
            setStatus('清空失败', 'error');
        }
    });

    // ===== Wave Animation =====
    let waveInterval = null;
    function startWave() {
        // 清除之前的定时器
        if (waveInterval) {
            clearInterval(waveInterval);
        }
        
        // 每200ms更新一次，加快动画速度
        waveInterval = setInterval(() => {
            if (!isRecording) {
                stopWave();
                return;
            }
            
            const micLevel = Math.min(1, currentAudioLevel * 60);
            const ttsLevel = Math.min(1, ttsAudioLevel * 2);
            const level = Math.max(micLevel, ttsLevel);
            
            for (let i = 0; i < waveBars.length; i++) {
                // 纯随机高度：8-32px 之间随机
                const h = 8 + Math.random() * 24;
                waveBars[i].style.height = h + 'px';
                waveBars[i].classList.remove('inactive');
            }
        }, 200);
    }

    function stopWave() {
        if (waveInterval) {
            clearInterval(waveInterval);
            waveInterval = null;
        }
        waveBars.forEach(b => { b.style.height = '10px'; b.classList.add('inactive'); });
    }

    // ===== Status =====
    function setStatus(msg, type) {
        statusEl.textContent = msg;
        statusEl.className = 'status-area' + (type ? ' ' + type : '');
    }

    // ===== Messages =====
    function addMessage(text, type, id) {
        if (welcome) welcome.style.display = 'none';
        const div = document.createElement('div');
        div.className = 'message ' + type;
        if (id) div.id = id;
        const avatar = type === 'user' ? '👤' : '🤖';
        div.innerHTML = `
            <div class="message-avatar">${avatar}</div>
            <div class="message-bubble">${text}</div>
        `;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
        return div;
    }

    function showThinking() {
        const div = document.createElement('div');
        div.className = 'message ai';
        div.id = 'thinkingMsg';
        div.innerHTML = `
            <div class="message-avatar">🤖</div>
            <div class="message-bubble">
                <div class="thinking-dots"><span></span><span></span><span></span></div>
            </div>
        `;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function removeThinking() {
        const el = document.getElementById('thinkingMsg');
        if (el) el.remove();
    }

    // ===== ASR WebSocket =====
    async function connectASR() {
        return new Promise((resolve, reject) => {
            const ws = new WebSocket(`${WS_BASE}/ws/realtime-asr`);
            ws.onopen = () => resolve(ws);
            ws.onerror = () => reject(new Error('连接失败'));
            setTimeout(() => reject(new Error('连接超时')), 10000);
        });
    }

    // 误识别过滤：简短语气词直接抛弃
    const NOISE_CHARS = ['嗯', '唔', '额', '呃', '哦', '哼', '哈'];

    function setupASRMsgHandler() {
        if (!realtimeWs) return;
        realtimeWs.onmessage = async (e) => {
            const data = JSON.parse(e.data);
            console.log('📩 ASR 原始数据:', JSON.stringify(data));
            if (data.type === 'result' && data.is_final) {
                const text = data.text.trim();
                if (!text) return;

                // 清理所有标点符号
                const cleanText = text.replace(/[。！？!?.，,;；:：\s]/g, '');
                
                // 检查是否只包含语气词
                const isOnlyNoise = cleanText.split('').every(char => NOISE_CHARS.includes(char));
                
                // 只过滤纯语气词（如"嗯"、"呃"），不过滤短文本
                if (isOnlyNoise) {
                    console.log('🗑️ 过滤底噪:', JSON.stringify(text), '->', JSON.stringify(cleanText));
                    return;
                }

                await handleFullDuplex(text);
            } else if (data.type === 'error') {
                setStatus('识别错误: ' + data.message, 'error');
            }
        };
    }

    // ===== Full Duplex =====
    async function handleFullDuplex(userText) {
        // 打断
        if (isSpeaking) {
            audioPlayer.pause();
            audioPlayer.src = '';
            isSpeaking = false;
            if (realtimeWs) { realtimeWs.close(); }
            try { realtimeWs = await connectASR(); setupASRMsgHandler(); } catch(e) {}
        }

        addMessage(userText, 'user');
        setStatus('AI 思考中...', 'active');

        try {
            // ===== ASR 完成 =====
            setPipeState(pipeAsr, 'done', pipeAsrTime);
            pipeAsrTime.textContent = '✓';

            // ===== LLM 推理 =====
            setPipeState(pipeLLM, 'running', pipeLLMTime);
            showThinking();

            const res = await fetch(`${API_BASE}/api/chat`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: userText })
            });
            const chat = await res.json();
            if (!chat.success) throw new Error(chat.error || '对话失败');

            setPipeState(pipeLLM, 'done', pipeLLMTime);
            removeThinking();
            addMessage(chat.reply, 'ai');

            // ===== TTS 合成 =====
            setPipeState(pipeTTS, 'running', pipeTTSTime);
            setStatus('TTS 语音合成中...', 'active');

            const engine = ttsEngineSelect.value;
            let ttsRes;
            if (engine === 'edge') {
                ttsRes = await fetch(`${API_BASE}/api/tts`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        text: chat.reply, 
                        voice: document.getElementById('voiceSelect').value,
                        rate: document.getElementById('rateSelect').value
                    })
                });
            } else {
                ttsRes = await fetch(`${API_BASE}/api/tts/bailian`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        text: chat.reply, 
                        voice: document.getElementById('bailianVoiceSelect').value
                    })
                });
            }

            if (!ttsRes.ok) throw new Error('语音合成失败');
            const blob = await ttsRes.blob();
            const url = URL.createObjectURL(blob);

            setPipeState(pipeTTS, 'done', pipeTTSTime);

            isSpeaking = true;
            setStatus('🔊 AI 回复中（可随时打断）', 'active');

            audioPlayer.src = url;
            audioPlayer.play();

            // TTS 播放期间保持波浪动态
            const ttsInterval = setInterval(() => {
                if (!audioPlayer.paused && audioPlayer.src) {
                    ttsAudioLevel = 0.3 + Math.random() * 0.6;
                }
            }, 60);

            await new Promise(r => { audioPlayer.onended = r; });
            ttsAudioLevel = 0;
            clearInterval(ttsInterval);

            isSpeaking = false;
            resetPipes();
            setStatus('👂 聆听中...', 'active');

        } catch (err) {
            removeThinking();
            isSpeaking = false;
            resetPipes();
            setPipeState(pipeAsr, 'error');
            setPipeState(pipeLLM, 'error');
            setPipeState(pipeTTS, 'error');
            setStatus('错误: ' + err.message, 'error');
        }
    }

    // ===== Recording =====
    recordBtn.addEventListener('click', async () => {
        if (!isRecording) await startRecording();
        else await stopRecording();
    });

    async function startRecording() {
        try {
            realtimeWs = await connectASR();
            setupASRMsgHandler();

            mediaStream = await navigator.mediaDevices.getUserMedia({ 
                audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true } 
            });

            // 尝试创建 16kHz 的 AudioContext，但浏览器可能不支持
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const actualSampleRate = audioContext.sampleRate;
            console.log(`🎤 AudioContext 实际采样率: ${actualSampleRate}Hz`);
            
            const source = audioContext.createMediaStreamSource(mediaStream);
            scriptProcessor = audioContext.createScriptProcessor(2048, 1, 1);

            // 重采样函数：将实际采样率降到 16kHz（线性插值）
            function downsample(buffer, fromSampleRate, toSampleRate) {
                if (fromSampleRate === toSampleRate) return buffer;
                const ratio = fromSampleRate / toSampleRate;
                const newLength = Math.round(buffer.length / ratio);
                const result = new Float32Array(newLength);
                
                // 线性插值
                for (let i = 0; i < newLength; i++) {
                    const srcIndex = i * ratio;
                    const srcIndexFloor = Math.floor(srcIndex);
                    const srcIndexCeil = Math.min(srcIndexFloor + 1, buffer.length - 1);
                    const frac = srcIndex - srcIndexFloor;
                    result[i] = buffer[srcIndexFloor] * (1 - frac) + buffer[srcIndexCeil] * frac;
                }
                return result;
            }

            // 持续发送音频到 ASR 服务端（带音量阈值过滤）
            const VAD_THRESHOLD = 0.01; // 音量阈值，低于此值认为是静音
            
            scriptProcessor.onaudioprocess = (e) => {
                if (!isRecording || !realtimeWs || realtimeWs.readyState !== WebSocket.OPEN) return;
                const input = e.inputBuffer.getChannelData(0);

                // 计算实时音量
                let energy = 0;
                for (let i = 0; i < input.length; i++) {
                    energy += Math.abs(input[i]);
                }
                currentAudioLevel = energy / input.length;

                // 音量阈值过滤：低于阈值不发送（避免噪音误识别）
                if (currentAudioLevel < VAD_THRESHOLD) {
                    return;
                }

                // 重采样到 16kHz
                const resampled = downsample(input, actualSampleRate, 16000);

                // 转换为 Int16 PCM
                const pcm = new Int16Array(resampled.length);
                for (let i = 0; i < resampled.length; i++) {
                    const s = Math.max(-1, Math.min(1, resampled[i]));
                    pcm[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                }
                realtimeWs.send(pcm.buffer);
            };

            source.connect(scriptProcessor);
            scriptProcessor.connect(audioContext.destination);

            isRecording = true;
            isSpeaking = false;
            recordBtn.classList.add('recording');
            recordLabel.textContent = '⏹ 停止对话';
            recordLabel.classList.add('active');
            if (welcome) welcome.style.display = 'none';
            startWave();
            setStatus('👂 聆听中...', 'active');

        } catch (err) {
            setStatus('启动失败: ' + err.message, 'error');
        }
    }

    async function stopRecording() {
        isRecording = false;
        recordBtn.classList.remove('recording');
        recordLabel.textContent = '🎤 开始对话';
        recordLabel.classList.remove('active');
        stopWave();

        if (scriptProcessor) { scriptProcessor.disconnect(); scriptProcessor = null; }
        if (audioContext) { audioContext.close(); audioContext = null; }
        if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
        if (realtimeWs) { realtimeWs.close(); realtimeWs = null; }

        audioPlayer.pause();
        audioPlayer.src = '';
        isSpeaking = false;
        setStatus('对话已停止', '');
    }
</script>
